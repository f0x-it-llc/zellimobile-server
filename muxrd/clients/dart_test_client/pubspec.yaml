name: muxr_client
description: >
  Headless Dart CLI that exercises the muxrd gRPC API end-to-end.
  Seeds the Phase-F Flutter client: generated bindings + connection/auth/stream code.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # grpc 5.x + protobuf 6.x are required by protoc_plugin 25.x (which generates
  # the bindings in lib/src/generated/).  grpc 4.x used protobuf <5 which is
  # incompatible with the generated code.
  grpc: ^5.0.0
  protobuf: ^6.0.0
  args: ^2.5.0

dev_dependencies:
  lints: ^4.0.0

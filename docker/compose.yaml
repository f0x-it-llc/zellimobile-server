# Muxr — dev rig: muxrd + muxrctl over SSH.
#
# Loopback (default — safe, nothing exposed):
#   docker compose -f docker/compose.yaml up --build
#
# LAN exposure (a phone on the same network can reach the server):
#   BIND_ADDR=<lan-ip> docker compose -f docker/compose.yaml up --build
#
# Tailnet / remote IP exposure:
#   The container binds 0.0.0.0 internally; BIND_ADDR selects which host
#   interface the ports are published on. Inside the container the tailnet IP
#   is not a local interface (it's a host-side NAT), so the server cannot
#   discover it automatically. ZELLIMSERVER_SAN injects it into the TLS cert
#   SAN so clients connecting on that IP get a valid cert. By default
#   ZELLIMSERVER_SAN falls back to BIND_ADDR, so just setting BIND_ADDR is
#   enough for the common case:
#
#   BIND_ADDR=100.x.y.z docker compose -f docker/compose.yaml up --build
#
#   Override ZELLIMSERVER_SAN explicitly if the cert must cover a different
#   or additional address (comma-separated list accepted).
#
# Or use the helper wrapper:
#   ./docker/run.sh --host <lan-ip>
#
# Then SSH in and drive it with muxrctl (a TTY is required — note the -t):
#   ssh -t root@<host> -p 2222     # no password
#   muxrctl                      # Configure → Cert → Tokens → Server → Pair
#
# muxrctl starts the gRPC server on :50051; the cert is self-signed (pair by
# scanning the QR, or trust the PEM / use the app's insecure-dev mode).
services:
  # ── Default rig: zellij backend ──────────────────────────────────────────────
  muxrd:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # Explicit target so `docker compose up` builds ONLY the zellij runtime and
      # never the opt-in herdr stage (runtime-herdr).
      target: runtime
    image: muxr-grpc-rig
    container_name: muxr-grpc-rig
    # BIND_ADDR controls which host interface the ports are published on.
    # Default 127.0.0.1 → loopback only (nothing leaves the host).
    # Set to a LAN IP to publish on the network.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${GRPC_PORT:-50051}:50051"
      # SSH — attach and drive muxrctl.
      - "${BIND_ADDR:-127.0.0.1}:${SSH_PORT:-2222}:22"
    environment:
      BACKEND: zellij
      SESSION: "${SESSION:-backend-dev}"
      # Inject the tailnet/LAN IP into the TLS cert SANs. Inside the container
      # the host's tailnet IP is not a local interface (it's a host-side NAT
      # publish), so the server cannot auto-discover it. This falls back to
      # BIND_ADDR so that `BIND_ADDR=<ip> docker compose up` is all that's
      # needed. Stays empty when the default loopback is used — safe/unchanged.
      ZELLIMSERVER_SAN: "${ZELLIMSERVER_SAN:-${BIND_ADDR:-}}"
    volumes:
      # Persist token DB, cert, session state, and zellij config across restarts.
      # muxrd data lives under zellij's XDG share dir.
      # docker compose down -v resets everything.
      - zellij-data:/root/.local/share/zellij
      - zellij-config:/root/.config/zellij
    stdin_open: true
    tty: true

  # ── Opt-in rig: herdr backend ────────────────────────────────────────────────
  # Exercises muxrd's herdr backend (`muxrd --backend herdr`). Gated behind the
  # `herdr` profile so it is built/started ONLY on demand:
  #   docker compose -f docker/compose.yaml --profile herdr up --build muxrd-herdr
  #   # or:  ./docker/run.sh --herdr
  # Publishes the same host ports as the zellij rig — run ONE at a time.
  # herdr is a separate, unmodified, user-installed binary (AGPL-3.0); muxrd drives
  # it only over its public 0600 sockets and stays the TLS/bearer boundary.
  muxrd-herdr:
    profiles: ["herdr"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime-herdr
      args:
        HERDR_VERSION: "${HERDR_VERSION:-0.7.1}"   # wire protocol 14 — see Dockerfile
    image: muxr-herdr-rig
    container_name: muxr-herdr-rig
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${GRPC_PORT:-50051}:50051"
      - "${BIND_ADDR:-127.0.0.1}:${SSH_PORT:-2222}:22"
    environment:
      BACKEND: herdr
      SESSION: "${SESSION:-herdr-dev}"
      ZELLIMSERVER_SAN: "${ZELLIMSERVER_SAN:-${BIND_ADDR:-}}"
    volumes:
      # muxrd's token DB + cert still live under the XDG share dir; herdr keeps its
      # own workspace/session state under ~/.config/herdr. Separate volumes from the
      # zellij rig so the two rigs don't share credential/session state.
      - muxrd-herdr-data:/root/.local/share/zellij
      - herdr-data:/root/.config/herdr
    stdin_open: true
    tty: true

  # ── Multi-backend rig: zellij AND herdr at once (Phase 3 serve-all) ──────────
  # The on-device test rig for simultaneous multi-backend. Uses the runtime-herdr
  # image (both binaries) but runs the entrypoint in BACKEND=both mode: it starts a
  # zellij session AND a headless herdr server and leaves MUXRD_BACKEND UNSET, so
  # the muxrctl-spawned muxrd auto-detects and serves BOTH backends. Both expose a
  # session named "${SESSION}" so you can verify same-name cross-backend routing
  # (the app distinguishes them by the backend badge: zellij green / herdr blue).
  # Gated behind the `both` profile; publishes the same host ports — run ONE rig at
  # a time.
  #   docker compose -f docker/compose.yaml --profile both up --build muxrd-both
  #   # or:  ./docker/run.sh --both [--host <lan-ip>]
  muxrd-both:
    profiles: ["both"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime-herdr
      args:
        HERDR_VERSION: "${HERDR_VERSION:-0.7.1}"   # wire protocol 14 — see Dockerfile
    image: muxr-both-rig
    container_name: muxr-both-rig
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${GRPC_PORT:-50051}:50051"
      - "${BIND_ADDR:-127.0.0.1}:${SSH_PORT:-2222}:22"
    environment:
      BACKEND: both
      SESSION: "${SESSION:-backend-dev}"
      ZELLIMSERVER_SAN: "${ZELLIMSERVER_SAN:-${BIND_ADDR:-}}"
    volumes:
      # Dedicated volumes so the multi-backend rig doesn't share credential/session
      # state with the zellij-only or herdr-only rigs. muxrd's token DB + cert live
      # under the XDG share dir; herdr keeps its workspace state under ~/.config/herdr;
      # zellij config (managed, plugin-disabled) under ~/.config/zellij.
      - muxrd-both-data:/root/.local/share/zellij
      - zellij-both-config:/root/.config/zellij
      - herdr-both-data:/root/.config/herdr
    stdin_open: true
    tty: true

volumes:
  zellij-data:
  zellij-config:
  muxrd-herdr-data:
  herdr-data:
  muxrd-both-data:
  zellij-both-config:
  herdr-both-data:
